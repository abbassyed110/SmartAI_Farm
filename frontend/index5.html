<!DOCTYPE html>
<html>
<head>
<title>Smart Local Services Platform</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_KEY"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#0a2540;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:8px 12px;
background:#0077b6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.container{
padding:20px;
}

.hidden{
display:none;
}

#map{
height:300px;
margin-top:10px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

img{
width:100%;
height:150px;
object-fit:cover;
border-radius:5px;
}

.rating{
color:orange;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:10px;
}

</style>
</head>

<body>

<header>
<h2>Smart Local Services</h2>
<div>
<button onclick="showUser()">User</button>
<button onclick="showAdmin()">Admin</button>
<button onclick="logout()">Logout</button>
</div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginSection">

<h3>Login</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- USER APP -->
<div id="userSection" class="hidden">

<h3>Find Services</h3>

<input id="search" placeholder="Search service">

<button onclick="searchService()">Search</button>

<button onclick="getLocation()">Detect My Location</button>

<div id="map"></div>

<div id="services"></div>

<hr>

<h3>Add Service Provider</h3>

<input id="pname" placeholder="Provider name">
<input id="ptype" placeholder="Service">
<input id="price" placeholder="Price">
<input type="file" id="photo">

<button onclick="addService()">Add Service</button>

</div>

<!-- ADMIN PANEL -->
<div id="adminSection" class="hidden">

<h3>Admin Dashboard</h3>

<table>

<tr>
<th>Name</th>
<th>Service</th>
<th>Action</th>
</tr>

<tbody id="adminTable"></tbody>

</table>

</div>

</div>

<script>

let services=[
{
name:"Ravi",
type:"Electrician",
price:500,
rating:5,
lat:17.385,
lng:78.486,
img:"https://via.placeholder.com/300"
},

{
name:"Suresh",
type:"Plumber",
price:400,
rating:4,
lat:12.971,
lng:77.594,
img:"https://via.placeholder.com/300"
}

]

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin"){
showAdmin()
}else{
showUser()
}

document.getElementById("loginSection").classList.add("hidden")

}

function logout(){

location.reload()

}

function showUser(){

document.getElementById("userSection").classList.remove("hidden")
document.getElementById("adminSection").classList.add("hidden")

displayServices()

initMap()

}

function showAdmin(){

document.getElementById("adminSection").classList.remove("hidden")
document.getElementById("userSection").classList.add("hidden")

loadAdmin()

}

function displayServices(){

let container=document.getElementById("services")

container.innerHTML=""

services.forEach((s,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${s.img}">

<h3>${s.name}</h3>

<p>${s.type}</p>

<p>₹${s.price}</p>

<p class="rating">${"⭐".repeat(s.rating)}</p>

<button onclick="pay(${s.price})">Book & Pay</button>

<button onclick="review(${i})">Review</button>

</div>

`

})

}

function searchService(){

let text=document.getElementById("search").value.toLowerCase()

let filtered=services.filter(s=>

s.type.toLowerCase().includes(text) ||
s.name.toLowerCase().includes(text)

)

displayFiltered(filtered)

}

function displayFiltered(data){

let container=document.getElementById("services")

container.innerHTML=""

data.forEach((s,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${s.img}">

<h3>${s.name}</h3>

<p>${s.type}</p>

<p>₹${s.price}</p>

<button onclick="pay(${s.price})">Book</button>

</div>

`

})

}

function review(i){

let r=prompt("Give rating 1-5")

services[i].rating=r

displayServices()

}

function pay(amount){

var options={

key:"YOUR_RAZORPAY_KEY",

amount:amount*100,

currency:"INR",

name:"Local Services",

description:"Service Booking",

handler:function(){

alert("Payment Successful")

}

}

var rzp=new Razorpay(options)

rzp.open()

}

function addService(){

let name=document.getElementById("pname").value
let type=document.getElementById("ptype").value
let price=document.getElementById("price").value
let file=document.getElementById("photo").files[0]

let reader=new FileReader()

reader.onload=function(e){

services.push({

name:name,
type:type,
price:price,
rating:3,
lat:17.0,
lng:78.0,
img:e.target.result

})

displayServices()

}

if(file) reader.readAsDataURL(file)

}

function loadAdmin(){

let table=document.getElementById("adminTable")

table.innerHTML=""

services.forEach((s,i)=>{

table.innerHTML+=`

<tr>

<td>${s.name}</td>

<td>${s.type}</td>

<td>
<button onclick="removeService(${i})">Remove</button>
</td>

</tr>

`

})

}

function removeService(i){

services.splice(i,1)

loadAdmin()

}

function getLocation(){

navigator.geolocation.getCurrentPosition(pos=>{

alert("Location detected")

})

}

function initMap(){

let center={lat:17.385,lng:78.486}

let map=new google.maps.Map(document.getElementById("map"),{

zoom:5,
center:center

})

services.forEach(s=>{

new google.maps.Marker({

position:{lat:s.lat,lng:s.lng},
map:map

})

})

}

</script>

</body>
</html>
